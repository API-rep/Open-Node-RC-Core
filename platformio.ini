; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html


[platformio]
; use machine envorinment as default
default_envs = machines
build_dir = ${sysenv.LOCALAPPDATA}/Temp/PlatformIO/build/Open_Node_RC_Core

; ### GLOBAL CONFIGURATION ###
[env]
platform = espressif32@6.7.0
board = esp32dev
framework = arduino
monitor_speed = 115200
monitor_encoding = utf-8
monitor_filters = direct
lib_deps = https://github.com/API-rep/PS4_Controller_Host.git#b58a05d  ; fork with BT init fix (IDF 4.4 FreeRTOS deadlock)
           https://github.com/API-rep/common_defs.git#main
           https://github.com/API-rep/PwmBroker.git#main
           https://github.com/API-rep/DcMotorCore.git#main
board_build.partitions = huge_app.csv
build_src_filter = -<*> +<core/**>  ; exclude all and add "core" directory
build_unflags = -std=gnu++11
build_flags = 
    -std=gnu++17
    -I src                            ; add "src" directory to include path (ex: #inclide <machines/config.h>)
    -I include                        ; add "include" directory to include path (done by default, just fo security)
    -D DEBUG_MONITOR_BAUD=${env.monitor_speed} ; debug serial baudrate from monitor configuration
    ; --- Core debug themes (new architecture) ---
    ; -D DEBUG_ALL                    ; enable all shared themes
    ; -D DEBUG_INPUT                  ; absorbed by dashboard Layer 3 (dashboard_input)
    -D DEBUG_HW                       ; hw init sequence log (DRV, BAT) — dashboard_drv covers runtime
    -D DEBUG_SYSTEM                   ; enable shared system debug path
    ; -D DEBUG_COMBUS                 ; absorbed by dashboard Layer 3 (dashboard_input)
    ; -D DEBUG_OUTPUT                 ; output transport trace (UART TX frame seq, len, flags)
    ; --- Debug verbosity level (NOTE: not yet wired in debug.h — future integration) ---
    ; -D DEBUG_LEVEL=0                ; 0 = errors only
    ; -D DEBUG_LEVEL=1                ; 1 = errors + warnings
    ; -D DEBUG_LEVEL=2                ; 2 = errors + warnings + info
    ; -D DEBUG_LEVEL=3                ; 3 = full verbose (all + debug traces)

; ### MACHINES BASE CONFIGURATION ###
[env:machines]
build_src_filter = ${env.build_src_filter} +<machines/>
build_flags = 
    ${env.build_flags}
    -D IS_MACHINE                  ; *** STRUCTURAL FLAG — do NOT remove ***
                                   ;     Activates machine-only sections in com-bus headers
                                   ;     (externs, input mapping). Absence = cross-boundary
                                   ;     consumer (sound node, remote) → enum IDs only.
    -I src/machines                ; "root" #includes to src/machines directory

; ### VOLVO A60H CONFIGURATION  ###
[env:volvo_A60H_bruder]
extends = env:machines             ; get the parent configuration
build_flags = 
    ${env:machines.build_flags}    ; inherit parent build flags
    ; -D BOARD=ESP32_8M_6S         ; optional: define the board if different from default
    -D MACHINE=VOLVO_A60_H_BRUDER
    -D MACHINE_TYPE=DUMPER_TRUCK
    -D DC_DRIVER_MODEL=DRV8801     ; for other DC driver model, se src/machines/boards/drivers.h
    -D INPUT_MODULE=PS4_DS4_BT     ; define the input module to be used
    -D PS4_BLUETOOTH_ADDRESS='"28:3a:4d:14:e6:e7"' ; define here your PS4 controller bluetooth address
    ; --- Battery sensing (see src/core/config/vbat/ for profiles) ---
    -D VBAT_SENSING=LIPO           ; enable battery sensing — LiPo profile (bat_lipo.h)
    ; --- Post-init pause (wait for ENTER or remote TRIANGLE before entering loop) ---
    -D PAUSE_LOG_AFTER_INIT
    ; --- ANSI terminal dashboard (200ms refresh, views: 0 overview 1 inputs 2 drivers 3 battery 4 combus C config) ---
    -D DEBUG_DASHBOARD
    ; --- Sound node UART TX (uncomment to activate) ---
    ; -D SOUND_OUTPUT_UART           ; activates output_init sound UART TX link

; ### REMOTES BASE CONFIGURATION ###
[env:remotes]
build_src_filter = ${env.build_src_filter} +<remotes/>
build_flags = 
    ${env.build_flags}
    -D IS_REMOTE
    -D REMOTE=MY_REMOTE            ; define the remote controller model
    -I src/remotes                 ; "root" #includes to src/remotes directory


; =============================================================================
; ### SOUND NODE CONFIGURATION
; =============================================================================
;
; Target: second ESP32 running the rc_engine_sound engine.
; Input layer replaced by ComBus UART transport (sound_uart_rx + sound_hal).
; Engine source files live in src/sound/engine/ (copy from rc_engine_sound).
;
; Required wiring (sound ESP32 side):
;   GPIO16 (Serial2 RX) ← Machine ESP32 TX
;   GPIO17 (Serial2 TX) → not used (uni-directional link)
;   GPIO25 DAC1, GPIO26 DAC2 → PAM8403 amplifier
;   GPIO4, GPIO5, GPIO18, GPIO19, GPIO21 → light outputs (see 6_Lights.h)
;

[env:sound_node_base]
; Core transport + sound module only (no PS4, no DC driver libs)
; build_src_filter paths are relative to src/ (the default src_dir)
build_src_filter = -<*> +<core/transport/**> +<sound_module/**>
build_flags =
    ${env.build_flags}
    -D SOUND_NODE                              ; identifies this env as a sound node
    -D COMBUS_HAL_INPUT                        ; disables RC receiver in engine source
    -I src                                     ; reach core/ and include/ namespaces
    -I include                                 ; project include/ directory

[env:sound_node_volvo]
extends = env:sound_node_base
; Additional libraries from rc_engine_sound (install as needed):
;   statusLED, rcTrigger, ESP32AnalogRead, Tone32, TFT_eSPI (optional LCD)
lib_deps =
    ${env.lib_deps}
    https://github.com/TheDIYGuy999/statusLED
    https://github.com/TheDIYGuy999/rcTrigger
    https://github.com/madhephaestus/ESP32AnalogRead
    https://github.com/lbernstone/Tone32
build_flags =
    ${env:sound_node_base.build_flags}
    -D MACHINE_TYPE=DUMPER_TRUCK   ; ComBus layout — matches volvo_A60H_bruder
    -D FLYSKY_FS_I6X               ; rc_engine_sound remote profile (channel index base)
    -D DEBUG_SYSTEM                ; enable sound node system logs on Serial