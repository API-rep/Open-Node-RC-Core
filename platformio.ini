; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html


[platformio]
; use machine envorinment as default
default_envs = machines
build_dir = ${sysenv.LOCALAPPDATA}/Temp/PlatformIO/build/Open_Node_RC_Core

; ### GLOBAL CONFIGURATION ###
[env]
platform = espressif32@6.7.0
board = esp32dev
framework = arduino
monitor_speed = 115200
monitor_encoding = utf-8
monitor_filters = direct
lib_deps = https://github.com/API-rep/PS4_Controller_Host.git#b58a05d  ; fork with BT init fix (IDF 4.4 FreeRTOS deadlock)
           https://github.com/API-rep/common_defs.git#main
           https://github.com/API-rep/PwmBroker.git#main
           https://github.com/API-rep/DcMotorCore.git#main
board_build.partitions = huge_app.csv
build_src_filter = -<*> +<core/**>  ; exclude all and add "core" directory
build_unflags = -std=gnu++11
build_flags = 
    -std=gnu++17
    -I src                            ; add "src" directory to include path (ex: #inclide <machines/config.h>)
    -I include                        ; add "include" directory to include path (done by default, just fo security)
    -D DEBUG_MONITOR_BAUD=${env.monitor_speed} ; debug serial baudrate from monitor configuration
    ; --- Core debug themes (new architecture) ---
    ; -D DEBUG_ALL                    ; enable all shared themes
    ; -D DEBUG_INPUT                  ; absorbed by dashboard Layer 3 (dashboard_input)
    ; -D DEBUG_HW                     ; absorbed by dashboard Layer 3 (dashboard_drv)
    -D DEBUG_SYSTEM                   ; enable shared system debug path
    ; -D DEBUG_COMBUS                 ; absorbed by dashboard Layer 3 (dashboard_input)
    ; --- Debug verbosity level (NOTE: not yet wired in debug.h — future integration) ---
    ; -D DEBUG_LEVEL=0                ; 0 = errors only
    ; -D DEBUG_LEVEL=1                ; 1 = errors + warnings
    ; -D DEBUG_LEVEL=2                ; 2 = errors + warnings + info
    ; -D DEBUG_LEVEL=3                ; 3 = full verbose (all + debug traces)

; ### MACHINES BASE CONFIGURATION ###
[env:machines]
build_src_filter = ${env.build_src_filter} +<machines/>
build_flags = 
    ${env.build_flags}
    -D IS_MACHINE
    -I src/machines                ; "root" #includes to src/machines directory

; ### VOLVO A60H CONFIGURATION  ###
[env:volvo_A60H_bruder]
extends = env:machines             ; get the parent configuration
build_flags = 
    ${env:machines.build_flags}    ; inherit parent build flags
    ; -D BOARD=ESP32_8M_6S         ; optional: define the board if different from default
    -D MACHINE=VOLVO_A60_H_BRUDER
    -D MACHINE_TYPE=DUMPER_TRUCK
    -D DC_DRIVER_MODEL=DRV8801     ; for other DC driver model, se src/machines/boards/drivers.h
    -D INPUT_MODULE=PS4_DS4_BT     ; define the input module to be used
    -D PS4_BLUETOOTH_ADDRESS='"28:3a:4d:14:e6:e7"' ; define here your PS4 controller bluetooth address
    ; --- Battery sensing (see src/core/config/vbat/ for profiles) ---
    -D VBAT_SENSING=LIPO           ; enable battery sensing — LiPo profile (bat_lipo.h)
    ; --- Post-init pause (wait for ENTER or remote TRIANGLE before entering loop) ---
    -D PAUSE_LOG_AFTER_INIT
    ; --- ANSI terminal dashboard (200ms refresh, views: 0 overview 1 inputs 2 drivers 3 battery 4 combus C config) ---
    -D DEBUG_DASHBOARD

; ### REMOTES BASE CONFIGURATION ###
[env:remotes]
build_src_filter = ${env.build_src_filter} +<remotes/>
build_flags = 
    ${env.build_flags}
    -D IS_REMOTE
    -D REMOTE=MY_REMOTE            ; define the remote controller model
    -I src/remotes                 ; "root" #includes to src/remotes directory